# Token Rotator Configuration
# Format: name | validation_source | validation_method
#
# validation_methods:
#   gh_cli        — runs gh auth status, parses per-account status
#   jwt_expiry    — extracts JWT from file, decodes exp claim
#   litellm_health — checks env var, optionally hits litellm /health
#   datadog_validate — checks env var is set and non-empty
#   http_check    — checks env var is set and non-empty
#
# Lines starting with # are ignored. Blank lines are ignored.

github_kevinmarx | gh auth status | gh_cli
github_kemarx_microsoft | gh auth status | gh_cli
azure_devops_npm | ~/.npmrc | jwt_expiry
anthropic | ANTHROPIC_AUTH_TOKEN | litellm_health
datadog_api | DD_API_KEY | datadog_validate
datadog_app | DD_APP_KEY | datadog_validate
braintrust | BRAINTRUST_API_KEY | http_check

# MCP-based services (validated by Claude using MCP tools, not shell)
ado_mcp | mcp_tool | ado_mcp_check
linear_mcp | mcp_tool | linear_mcp_check
